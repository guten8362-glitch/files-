kind = "mobile"
previewPath = "/"
title = "PrintA4 Maintenance App"
version = "1.0.0"
id = "artifacts/printa4-app"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/" ]
localPort = 20872

[services.development]
run = "pnpm --filter @workspace/printa4-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/printa4-app", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/printa4-app", "run", "serve" ]

[services.env]
PORT = "20872"
BASE_PATH = "/"
